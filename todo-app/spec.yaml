spec:
  containers:
    - name: todo-app
      image: ${IMAGE_REPO}/todo-app:${IMAGE_TAG}
      readinessProbe:
        port: 8080
        path: /healthcheck
      resources:
        requests:
          memory: 256M
          cpu: 0.5
        limits:
          memory: 512M
          cpu: 1
  endpoints:
    - name: todoendpoint
      port: 8080
      public: true
